<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Сюрприз для тебя!</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        body { font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f0f2f5; overflow: hidden; }
        .card { text-align: center; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); transition: 0.5s; z-index: 10; }
        input { padding: 10px; font-size: 18px; border-radius: 10px; border: 2px solid #ff4757; outline: none; }
        button { padding: 10px 20px; font-size: 18px; background: #ff4757; color: white; border: none; border-radius: 10px; cursor: pointer; margin-left: 10px; }
        #celebration { display: none; animation: zoomIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .meme { width: 300px; border-radius: 15px; margin-top: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        @keyframes zoomIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <!-- Шаг 1: Ввод имени -->
    <div id="start-screen" class="card">
        <h1>👋 Привет! Как тебя зовут?</h1>
        <input type="text" id="userName" placeholder="Твое имя...">
        <button onclick="startCelebration()">Жми!</button>
    </div>

    <!-- Шаг 2: Поздравление и мемы -->
    <div id="celebration" class="card">
        <h1 id="greeting"></h1>
        <p>Ты просто космос! Вот тебе мем:</p>
        <!-- Замени ссылку на любой свой мем -->
        <img class="meme" src="https://media.giphy.com" alt="Meme">
        <br>
        <button onclick="location.reload()" style="background: #747d8c; margin-top: 20px;">Назад</button>
    </div>

    <script>
        function startCelebration() {
            const name = document.getElementById('userName').value;
            if (name.trim() === "") { alert("Введи имя, ну чего ты!"); return; }

            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('celebration').style.display = 'block';
            document.getElementById('greeting').innerText = `🎉 Поздравляю, ${name}!`;

            // Запуск конфетти
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ff4757', '#2f3542', '#3742fa']
            });
        }
    </script>
</body>
</html>
