<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- Чтобы сайт не нашли в поиске -->
    <meta name="robots" content="noindex, nofollow">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для тебя!</title>
    <!-- Подключаем наш CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
	<!-- Музыкальный плеер. loop — для бесконечного повтора -->
	<audio id="bgMusic" loop>
		<source src="media/music.mp3" type="audio/mpeg">
		Ваш браузер не поддерживает музыку.
	</audio>
	
	<!-- Экран 1 -->
    <div id="start-screen" class="card">
		<img width="80px" src="media/disco1.gif" alt="disco">
		<img width="100px" src="media/disco1.gif" alt="disco">
        <h1>Марта</h1>
        <p>👋 Привет! Ты приглашена на специальную вечеринку в честь 8&nbsp;марта, введи свое имя и узнай кто ты на этой вечеринке</p>
        <input type="text" id="userName" placeholder="Твое имя..." autocomplete="off">
        <br>
        <button onclick="showBirthday()">Попасть на вечеринку</button>
		<p>🔊 Осторожно, будет звук)</p>
    </div>

    <!-- Экран 2 -->
    <div id="celebration" class="card">
        <h1 id="greeting"></h1>
        <!-- Твоя ссылка на мем -->
		<div class="meme-wrapper">
			<div id="gif-loader" class="loader" style="display: none;"></div>
			<img id="randomMeme" class="meme" src="" style="opacity: 0; transition: opacity 0.4s ease;">
		</div>
		<p id="random-phrase"></p>
		<br>
		<div class="buttons-row">
			<button onclick="changeMeme()">Хочу другую!</button>
			<button class="btn-secondary " onclick="location.reload()">Назад</button>
		</div>
    </div>
	
	<!-- Видео на фон -->
	<video id="bgVideo" autoplay loop muted playsinline>
		<source src="media/Vielleicht.mp4" type="video/mp4">
	</video>
	

    <!-- Твой холст для бликов -->
    <canvas id="discoGlints"></canvas>

    <script src="script.js"></script>
</body>
</html>
